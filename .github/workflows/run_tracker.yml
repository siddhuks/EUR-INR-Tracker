name: EUR INR Tracker
on: schedule: - cron: "0 * * * *" workflow_dispatch:
jobs: run-tracker: runs-on: ubuntu-latest
steps:
  - uses: actions/checkout@v3

  - uses: actions/setup-python@v4
    with:
      python-version: "3.11"

  - uses: actions/cache@v3
    with:
      path: eur_inr_state.json
      key: eur-inr-state-${{ github.run_id }}
      restore-keys: eur-inr-state-

  - run: pip install requests twilio

  - run: python tracker.py
    env:
      TWILIO_SID: ${{ secrets.TWILIO_SID }}
      TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
      TO_WHATSAPP: ${{ secrets.TO_WHATSAPP }}

  - uses: actions/cache@v3
    with:
      path: eur_inr_state.json
      key: eur-inr-state-${{ github.run_id }}
